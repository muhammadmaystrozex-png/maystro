name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ─── 1. Checkout ───────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─── 2. Setup Python ───────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ─── 3. Setup Java 11 (متوافق مع Buildozer) ───
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # ─── 4. Install System Dependencies ─────────────
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip python3-venv python3-dev \
            build-essential git zip unzip \
            libffi-dev libssl-dev autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libsqlite3-dev libjpeg-dev libfreetype6-dev \
            libgl1-mesa-dev libgles2-mesa-dev

      # ─── 5. Install Buildozer & Cython ──────────────
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade cython buildozer

      # ─── 6. Cache Android SDK & NDK ────────────────
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform
            ~/.buildozer/android/packages
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # ─── 7. Prepare Android SDK Directories ─────────
      - name: Prepare Android SDK
        run: |
          mkdir -p ~/.buildozer/android/platform
          mkdir -p ~/.buildozer/android/packages
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

      # ─── 8. Build APK ─────────────────────────────
      - name: Build APK
        run: |
          buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0

      # ─── 9. Upload APK ────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LegalAssistant-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
